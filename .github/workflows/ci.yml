name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go build -v ./...

  tinygo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.41.0'
      - run: tinygo build -opt=z -no-debug -o minitang-tiny .
      - run: ./minitang-tiny -h 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: minitang-tiny-linux-amd64
          path: minitang-tiny
